<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 886" role="img" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
<title>Fluxograma do login/cadastro via GitHub (OAuth)</title>
<desc>Fluxograma com raias para Usuário, Front-end, GitHub e Back-end, mostrando o redirecionamento para autorização, a troca do code por token e a decisão de criar ou rejeitar a conta.</desc>
<style>
  text { font-family: -apple-system, Segoe UI, Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 600; }
  .ts { font-size: 12px; font-weight: 400; }
  .lane-header { fill: #FAF9F6; stroke: #B4B2A9; }
  .lane-header-text { fill: #2C2C2A; }
  .divider { stroke: #B4B2A9; stroke-dasharray: 3,3; stroke-width: 0.75; }
  .arrow { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
  .label { fill: #5F5E5A; }
  .gray-fill { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
  .gray-title { fill: #444441; }
  .gray-sub { fill: #5F5E5A; }
  .blue-fill { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
  .blue-title { fill: #0C447C; }
  .blue-sub { fill: #185FA5; }
  .purple-fill { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .purple-title { fill: #3C3489; }
  .purple-sub { fill: #534AB7; }
  .coral-fill { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
  .coral-title { fill: #712B13; }
  .teal-fill { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .teal-title { fill: #085041; }
  .teal-sub { fill: #0F6E56; }
  @media (prefers-color-scheme: dark) {
    .lane-header { fill: #2C2C2A; stroke: #5F5E5A; }
    .lane-header-text { fill: #D3D1C7; }
    .divider { stroke: #5F5E5A; }
    .arrow { stroke: #B4B2A9; }
    .label { fill: #B4B2A9; }
    .gray-fill { fill: #2C2C2A; stroke: #B4B2A9; }
    .gray-title { fill: #D3D1C7; }
    .gray-sub { fill: #B4B2A9; }
    .blue-fill { fill: #0C447C; stroke: #85B7EB; }
    .blue-title { fill: #B5D4F4; }
    .blue-sub { fill: #85B7EB; }
    .purple-fill { fill: #3C3489; stroke: #AFA9EC; }
    .purple-title { fill: #CECBF6; }
    .purple-sub { fill: #AFA9EC; }
    .coral-fill { fill: #712B13; stroke: #F0997B; }
    .coral-title { fill: #F5C4B3; }
    .teal-fill { fill: #085041; stroke: #5DCAA5; }
    .teal-title { fill: #9FE1CB; }
    .teal-sub { fill: #5DCAA5; }
  }
</style>
<defs>
  <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<line x1="180" y1="20" x2="180" y2="866" class="divider"/>
<line x1="330" y1="20" x2="330" y2="866" class="divider"/>
<line x1="480" y1="20" x2="480" y2="866" class="divider"/>

<rect x="45" y="40" width="120" height="24" rx="4" class="lane-header"/>
<text class="th lane-header-text" x="105" y="52" text-anchor="middle" dominant-baseline="central">Usuário</text>
<rect x="195" y="40" width="120" height="24" rx="4" class="lane-header"/>
<text class="th lane-header-text" x="255" y="52" text-anchor="middle" dominant-baseline="central">Front-end</text>
<rect x="345" y="40" width="120" height="24" rx="4" class="lane-header"/>
<text class="th lane-header-text" x="405" y="52" text-anchor="middle" dominant-baseline="central">GitHub</text>
<rect x="495" y="40" width="120" height="24" rx="4" class="lane-header"/>
<text class="th lane-header-text" x="555" y="52" text-anchor="middle" dominant-baseline="central">Back-end</text>

<rect x="45" y="100" width="120" height="56" rx="8" class="gray-fill"/>
<text class="th gray-title" x="105" y="114" text-anchor="middle" dominant-baseline="central">Clica login</text>
<text class="ts gray-sub" x="105" y="142" text-anchor="middle" dominant-baseline="central">via GitHub</text>

<rect x="195" y="196" width="120" height="56" rx="8" class="blue-fill"/>
<text class="th blue-title" x="255" y="210" text-anchor="middle" dominant-baseline="central">Redireciona</text>
<text class="ts blue-sub" x="255" y="238" text-anchor="middle" dominant-baseline="central">c/ state</text>

<rect x="345" y="292" width="120" height="56" rx="8" class="gray-fill"/>
<text class="th gray-title" x="405" y="306" text-anchor="middle" dominant-baseline="central">Autoriza e</text>
<text class="ts gray-sub" x="405" y="334" text-anchor="middle" dominant-baseline="central">retorna code</text>

<rect x="195" y="388" width="120" height="56" rx="8" class="blue-fill"/>
<text class="th blue-title" x="255" y="402" text-anchor="middle" dominant-baseline="central">Valida state</text>
<text class="ts blue-sub" x="255" y="430" text-anchor="middle" dominant-baseline="central">envia code</text>

<rect x="495" y="484" width="120" height="56" rx="8" class="purple-fill"/>
<text class="th purple-title" x="555" y="498" text-anchor="middle" dominant-baseline="central">Troca code</text>
<text class="ts purple-sub" x="555" y="526" text-anchor="middle" dominant-baseline="central">por dados</text>

<polygon points="555,580 630,617 555,654 480,617" class="purple-fill"/>
<text class="th purple-title" x="555" y="617" text-anchor="middle" dominant-baseline="central">E-mail existe?</text>

<rect x="195" y="595" width="120" height="44" rx="8" class="coral-fill"/>
<text class="th coral-title" x="255" y="617" text-anchor="middle" dominant-baseline="central">Exibe erro</text>

<rect x="495" y="694" width="120" height="56" rx="8" class="purple-fill"/>
<text class="th purple-title" x="555" y="708" text-anchor="middle" dominant-baseline="central">Cria conta</text>
<text class="ts purple-sub" x="555" y="736" text-anchor="middle" dominant-baseline="central">gera JWT</text>

<rect x="195" y="790" width="120" height="56" rx="8" class="teal-fill"/>
<text class="th teal-title" x="255" y="804" text-anchor="middle" dominant-baseline="central">Salva token</text>
<text class="ts teal-sub" x="255" y="832" text-anchor="middle" dominant-baseline="central">entra no app</text>

<path d="M105,156 L105,176 L255,176 L255,196" class="arrow" marker-end="url(#arrow2)"/>
<path d="M255,252 L255,272 L405,272 L405,292" class="arrow" marker-end="url(#arrow2)"/>
<path d="M405,348 L405,368 L255,368 L255,388" class="arrow" marker-end="url(#arrow2)"/>
<path d="M255,444 L255,464 L555,464 L555,484" class="arrow" marker-end="url(#arrow2)"/>
<line x1="555" y1="540" x2="555" y2="580" class="arrow" marker-end="url(#arrow2)"/>
<line x1="480" y1="617" x2="317" y2="617" class="arrow" marker-end="url(#arrow2)"/>
<line x1="555" y1="654" x2="555" y2="694" class="arrow" marker-end="url(#arrow2)"/>
<path d="M555,750 L555,770 L255,770 L255,790" class="arrow" marker-end="url(#arrow2)"/>

<text class="ts label" x="400" y="602" text-anchor="middle">Sim</text>
<text class="ts label" x="580" y="674" text-anchor="middle">Não</text>
</svg>
