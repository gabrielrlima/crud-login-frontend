<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 886" role="img" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
<title>Fluxograma de recuperação de senha (esqueci minha senha)</title>
<desc>Fluxograma com raias para Usuário, Front-end e Back-end, mostrando o pedido de recuperação por e-mail, a abertura do link recebido e a redefinição da senha.</desc>
<style>
  text { font-family: -apple-system, Segoe UI, Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 600; }
  .ts { font-size: 12px; font-weight: 400; }
  .lane-header { fill: #FAF9F6; stroke: #B4B2A9; }
  .lane-header-text { fill: #2C2C2A; }
  .divider { stroke: #B4B2A9; stroke-dasharray: 3,3; stroke-width: 0.75; }
  .arrow { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
  .label { fill: #5F5E5A; }
  .gray-fill { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
  .gray-title { fill: #444441; }
  .gray-sub { fill: #5F5E5A; }
  .blue-fill { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
  .blue-title { fill: #0C447C; }
  .blue-sub { fill: #185FA5; }
  .purple-fill { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .purple-title { fill: #3C3489; }
  .purple-sub { fill: #534AB7; }
  .coral-fill { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
  .coral-title { fill: #712B13; }
  .teal-fill { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .teal-title { fill: #085041; }
  .teal-sub { fill: #0F6E56; }
  @media (prefers-color-scheme: dark) {
    .lane-header { fill: #2C2C2A; stroke: #5F5E5A; }
    .lane-header-text { fill: #D3D1C7; }
    .divider { stroke: #5F5E5A; }
    .arrow { stroke: #B4B2A9; }
    .label { fill: #B4B2A9; }
    .gray-fill { fill: #2C2C2A; stroke: #B4B2A9; }
    .gray-title { fill: #D3D1C7; }
    .gray-sub { fill: #B4B2A9; }
    .blue-fill { fill: #0C447C; stroke: #85B7EB; }
    .blue-title { fill: #B5D4F4; }
    .blue-sub { fill: #85B7EB; }
    .purple-fill { fill: #3C3489; stroke: #AFA9EC; }
    .purple-title { fill: #CECBF6; }
    .purple-sub { fill: #AFA9EC; }
    .coral-fill { fill: #712B13; stroke: #F0997B; }
    .coral-title { fill: #F5C4B3; }
    .teal-fill { fill: #085041; stroke: #5DCAA5; }
    .teal-title { fill: #9FE1CB; }
    .teal-sub { fill: #5DCAA5; }
  }
</style>
<defs>
  <marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<line x1="240" y1="20" x2="240" y2="866" class="divider"/>
<line x1="440" y1="20" x2="440" y2="866" class="divider"/>

<rect x="65" y="40" width="150" height="24" rx="4" class="lane-header"/>
<text class="th lane-header-text" x="140" y="52" text-anchor="middle" dominant-baseline="central">Usuário</text>
<rect x="265" y="40" width="150" height="24" rx="4" class="lane-header"/>
<text class="th lane-header-text" x="340" y="52" text-anchor="middle" dominant-baseline="central">Front-end</text>
<rect x="465" y="40" width="150" height="24" rx="4" class="lane-header"/>
<text class="th lane-header-text" x="540" y="52" text-anchor="middle" dominant-baseline="central">Back-end</text>

<rect x="65" y="100" width="150" height="56" rx="8" class="gray-fill"/>
<text class="th gray-title" x="140" y="114" text-anchor="middle" dominant-baseline="central">Informa e-mail</text>
<text class="ts gray-sub" x="140" y="142" text-anchor="middle" dominant-baseline="central">para recuperar</text>

<rect x="265" y="196" width="150" height="56" rx="8" class="blue-fill"/>
<text class="th blue-title" x="340" y="210" text-anchor="middle" dominant-baseline="central">Envia pedido</text>
<text class="ts blue-sub" x="340" y="238" text-anchor="middle" dominant-baseline="central">POST esqueci</text>

<rect x="465" y="292" width="150" height="56" rx="8" class="purple-fill"/>
<text class="th purple-title" x="540" y="306" text-anchor="middle" dominant-baseline="central">Envia e-mail</text>
<text class="ts purple-sub" x="540" y="334" text-anchor="middle" dominant-baseline="central">sempre OK (RNF01)</text>

<rect x="65" y="388" width="150" height="56" rx="8" class="gray-fill"/>
<text class="th gray-title" x="140" y="402" text-anchor="middle" dominant-baseline="central">Abre o link</text>
<text class="ts gray-sub" x="140" y="430" text-anchor="middle" dominant-baseline="central">no e-mail</text>

<rect x="265" y="484" width="150" height="56" rx="8" class="blue-fill"/>
<text class="th blue-title" x="340" y="498" text-anchor="middle" dominant-baseline="central">Define nova</text>
<text class="ts blue-sub" x="340" y="526" text-anchor="middle" dominant-baseline="central">POST redefinir</text>

<polygon points="540,580 615,617 540,654 465,617" class="purple-fill"/>
<text class="th purple-title" x="540" y="617" text-anchor="middle" dominant-baseline="central">Token válido?</text>

<rect x="265" y="595" width="150" height="44" rx="8" class="coral-fill"/>
<text class="th coral-title" x="340" y="617" text-anchor="middle" dominant-baseline="central">Exibe erro</text>

<rect x="465" y="694" width="150" height="56" rx="8" class="purple-fill"/>
<text class="th purple-title" x="540" y="708" text-anchor="middle" dominant-baseline="central">Salva senha</text>
<text class="ts purple-sub" x="540" y="736" text-anchor="middle" dominant-baseline="central">invalida sessões</text>

<rect x="265" y="790" width="150" height="56" rx="8" class="teal-fill"/>
<text class="th teal-title" x="340" y="804" text-anchor="middle" dominant-baseline="central">Redefinida</text>
<text class="ts teal-sub" x="340" y="832" text-anchor="middle" dominant-baseline="central">vai pro login</text>

<path d="M140,156 L140,176 L340,176 L340,196" class="arrow" marker-end="url(#arrow3)"/>
<path d="M340,252 L340,272 L540,272 L540,292" class="arrow" marker-end="url(#arrow3)"/>
<path d="M540,348 L540,368 L140,368 L140,388" class="arrow" marker-end="url(#arrow3)"/>
<path d="M140,444 L140,464 L340,464 L340,484" class="arrow" marker-end="url(#arrow3)"/>
<path d="M340,540 L340,560 L540,560 L540,580" class="arrow" marker-end="url(#arrow3)"/>
<line x1="465" y1="617" x2="417" y2="617" class="arrow" marker-end="url(#arrow3)"/>
<line x1="540" y1="654" x2="540" y2="694" class="arrow" marker-end="url(#arrow3)"/>
<path d="M540,750 L540,770 L340,770 L340,790" class="arrow" marker-end="url(#arrow3)"/>

<text class="ts label" x="440" y="602" text-anchor="middle">Não</text>
<text class="ts label" x="565" y="674" text-anchor="middle">Sim</text>
</svg>
